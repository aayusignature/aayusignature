<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Lyrics | AAYU SIGNATURE</title>
    
    <!-- Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .lyrics-search-hero {
            position: relative;
            height: 35vh;
            min-height: 280px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }
        .search-box-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            margin: 20px auto 0 auto;
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .search-box-wrap input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            padding-left: 15px;
            font-family: 'Poppins', sans-serif;
        }
        .lyrics-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }
        .lyrics-preview {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin: 15px 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
        }
        .toast-popup {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--gold-metallic); color: #000; font-weight: 700; padding: 12px 35px;
            border-radius: 30px; z-index: 10000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-popup.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <!-- Premium Navbar -->
    <nav class="navbar">
        <div class="logo">AAYU <span class="text-gold">SIGNATURE</span></div>
        <div class="nav-links">
            <a href="index.html">🏠 Home</a>
            <a href="songs.html">🎵 Songs</a>
            <a href="videos.html">📺 Videos</a>
            <a href="lyrics.html" class="active">📝 Lyrics</a>
            <a href="about.html">👤 About</a>
        </div>
        <button id="install-pwa" class="btn-gold" style="display: none;"><i class="fas fa-download"></i> Install App</button>
    </nav>

    <!-- Header Section -->
    <section class="lyrics-search-hero">
        <div style="position: relative; z-index: 10; width: 100%;">
            <h1 class="cinzel-font text-gold" style="font-size: 2.3rem;">Lyrics Center</h1>
            <p style="color: var(--text-gray); font-size: 0.9rem;">Find complete text breakdowns and poetic compositions</p>
            
            <div class="search-box-wrap">
                <i class="fas fa-search text-gold"></i>
                <input type="text" id="lyrics-search" placeholder="Type song title to extract lines...">
            </div>
        </div>
    </section>

    <!-- Main Container Grid -->
    <main class="section-padding" style="padding-top: 20px;">
        <div id="lyrics-archive-grid" class="grid-3">
            <div style="grid-column: 1/-1; text-align: center; color: var(--gold-solid);" class="loader">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                <p style="margin-top: 10px; color: #fff;">Mapping Audio Scripts...</p>
            </div>
        </div>
    </main>

    <!-- Toast UI Element -->
    <div id="lyrics-toast" class="toast-popup">Securely copied!</div>

    <footer id="dynamic-footer"></footer>

    <!-- Scripts Injection Lineup -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/lyrics.js"></script>
</body>
</html>

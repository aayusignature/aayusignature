<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos & Shorts Gallery | AAYU SIGNATURE</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .tabs-container {
            display: flex; justify-content: center; gap: 20px; margin: 40px 0 20px 0;
        }
        .tab-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 10px 25px; border-radius: 30px; cursor: pointer; font-family: 'Poppins', sans-serif;
            font-weight: 600; transition: 0.3s ease;
        }
        .tab-btn.active {
            background: var(--gold-metallic); color: #000; border: none;
            box-shadow: 0 0 15px var(--gold-glow);
        }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px 8px 0 0; }
        
        /* Ultra Premium Shorts Matrix Layout (9:16 aspect ratio) */
        .shorts-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px;
            width: 90%; max-width: 1200px; margin: 0 auto;
        }
        .shorts-card {
            background: var(--glass-background); border: 1px solid var(--glass-border); border-radius: 12px;
            overflow: hidden; transition: 0.4s; position: relative;
        }
        .shorts-card:hover { transform: scale(1.03); border-color: var(--gold-solid); }
        .shorts-thumb { width: 100%; aspect-ratio: 9/16; object-fit: cover; }
        .shorts-info {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px 10px;
            background: linear-gradient(to top, #000 70%, transparent);
        }
    </style>
</head>
<body>

    <!-- Premium Navbar -->
    <nav class="navbar">
        <div class="logo">AAYU <span class="text-gold">SIGNATURE</span></div>
        <div class="nav-links">
            <a href="index.html">🏠 Home</a>
            <a href="songs.html">🎵 Songs</a>
            <a href="videos.html" class="active">📺 Videos</a>
            <a href="lyrics.html">📝 Lyrics</a>
            <a href="about.html">👤 About</a>
        </div>
        <button id="install-pwa" class="btn-gold" style="display: none;"><i class="fas fa-download"></i> Install App</button>
    </nav>

    <!-- Sub-Hero Section -->
    <section class="section-padding" style="padding-bottom: 0; padding-top: 120px; text-align: center;">
        <h1 class="cinzel-font text-gold" style="font-size: 2.3rem;">Media Vault</h1>
        <p style="color: var(--text-gray); font-size: 0.9rem;">Watch official cinematic creations and behind the scenes shorts</p>
        
        <!-- Toggle Control Tabs -->
        <div class="tabs-container">
            <button class="tab-btn active" id="btn-show-vids"><i class="fas fa-video"></i> Official Videos</button>
            <button class="tab-btn" id="btn-show-shorts"><i class="fas fa-bolt"></i> YouTube Shorts</button>
        </div>
    </section>

    <!-- Content Sections Matrix -->
    <main class="section-padding" style="padding-top: 30px;">
        <!-- Container 1: Standard Landscape Layout -->
        <div id="landscape-vids-grid" class="grid-3">
            <div style="grid-column: 1/-1; text-align: center; color: var(--gold-solid);" class="loader">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                <p style="margin-top: 10px; color:#fff;">Syncing Official Video Streams...</p>
            </div>
        </div>

        <!-- Container 2: Vertical Portrait Layout (Initially Hidden) -->
        <div id="portrait-shorts-grid" class="shorts-grid" style="display: none;"></div>
    </main>

    <!-- Footer Container -->
    <footer id="dynamic-footer"></footer>

    <!-- Scripts Pipeline -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/vids.js"></script>
</body>
</html>

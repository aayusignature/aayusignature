<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Releases | AAYU SIGNATURE</title>
    
    <!-- Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .search-hero {
            position: relative;
            height: 38vh;
            min-height: 300px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }
        .search-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, #050505, rgba(5,5,5,0.7));
        }
        .search-box-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .search-box-container input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            padding-left: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
        }
        .song-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px 8px 0 0; }
    </style>
</head>
<body>

    <!-- Premium Header -->
    <nav class="navbar">
        <div class="logo">AAYU <span class="text-gold">SIGNATURE</span></div>
        <div class="nav-links">
            <a href="index.html">🏠 Home</a>
            <a href="songs.html" class="active">🎵 Songs</a>
            <a href="videos.html">📺 Videos</a>
            <a href="lyrics.html">📝 Lyrics</a>
            <a href="about.html">👤 About</a>
        </div>
        <button id="install-pwa" class="btn-gold" style="display: none;"><i class="fas fa-download"></i> Install App</button>
    </nav>

    <!-- Interactive Search Sub-Hero -->
    <section class="search-hero">
        <div class="search-overlay"></div>
        <div style="position: relative; z-index: 10; width: 100%;">
            <h1 class="cinzel-font text-gold" style="font-size: 2.5rem;">DISCOGRAPHY</h1>
            <p style="color: var(--text-gray); font-size: 0.9rem;">Explore the complete soundscape of AAYU SIGNATURE</p>
            
            <!-- Custom Search Field -->
            <div class="search-box-container" style="margin-left: auto; margin-right: auto;">
                <i class="fas fa-search text-gold"></i>
                <input type="text" id="track-search-input" placeholder="Search song title or keyword...">
            </div>
        </div>
    </section>

    <!-- Main Dynamic Vault Grid -->
    <section class="section-padding" style="padding-top: 40px;">
        <div id="songs-library-grid" class="grid-3">
            <div style="grid-column: 1/-1; text-align: center; padding: 60px 0;" class="text-gold">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p style="margin-top: 15px; color: #fff;">Syncing Premium Audio Files...</p>
            </div>
        </div>
    </section>

    <!-- Dynamic Footer Component -->
    <footer id="dynamic-footer"></footer>

    <!-- Scripts Injection Sequence -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/songs.js"></script>
</body>
</html>
